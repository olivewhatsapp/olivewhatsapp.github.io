<body>

  <header id="home"><br><br><br></header>
  <h1>GPicker</h1>
  <img id="gpicker" class="card" style="display: block; margin: 0 auto;" src="">
  <h3><a href="gpicker.html">Choose again</a></h3>
  <script>
  const images = [
    "cwn/Pris’mah, Guiding Star.jpeg",
    "cwn/Atlantis Rising.jpeg",
	"cwn/Pario and Ainanis, Key and Gate.jpeg",
    "cwn/Dead Aim.jpeg",
	"cwn/Forces of Nature.jpeg",
	"cwn/Agent S, Shadowwalker.jpeg",
	"Gaia’s Renewing Requiem.jpeg",
	"cwn/G, Black Suit Leader.jpeg",
	"cwn/Lunar Shield Blast.jpeg",
	"cwn/Radiant Saber.jpeg",
	"cwn/Rei Chronoa, Eye of Cosmos.jpeg",
	"cwn/Shiro, Rift-Rending Claw.jpeg",];
  function gpicker() {const index = Math.floor(Math.random() * images.length); const element = document.getElementById("gpicker"); if (element) {element.src = images[index];}} document.addEventListener('DOMContentLoaded', (event) => {gpicker();});
  </script>
